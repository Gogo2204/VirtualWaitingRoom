#
# Virtual Waiting Room — Apache virtual host
#
# XAMPP setup:
#   1. Copy (or Include) this file into XAMPP's vhosts config:
#        Windows : C:\xampp\apache\conf\extra\httpd-vhosts.conf
#        macOS   : /Applications/XAMPP/xamppfiles/etc/extra/httpd-vhosts.conf
#
#   2. Replace PROJECT_ROOT with the absolute path to this repository.
#        Windows example: C:/xampp/htdocs/VirtualWaitingRoom
#        macOS example  : /Applications/XAMPP/xamppfiles/htdocs/VirtualWaitingRoom
#
#   3. Add the ServerName to your hosts file so the browser resolves it:
#        Windows : C:\Windows\System32\drivers\etc\hosts
#        macOS   : /etc/hosts
#      Append:  127.0.0.1  vwr.local
#
#   4. Make sure mod_rewrite is enabled in httpd.conf:
#        Uncomment:  LoadModule rewrite_module modules/mod_rewrite.so
#
#   5. Copy .env.apache to .env at the project root:
#        Windows : copy .env.apache .env
#        macOS   : cp .env.apache .env
#      Then set DB_PASSWORD and JWT_SECRET as needed.
#      (Default XAMPP MySQL has no root password, so DB_PASSWORD can stay blank.)
#
#   6. Import the database schema:
#        Run the SQL files from migrations/ in your XAMPP phpMyAdmin.
#
#   7. Restart Apache, then open http://vwr.local in your browser.
#

<VirtualHost *:80>
    ServerName vwr.local
    DocumentRoot "PROJECT_ROOT/public"

    <Directory "PROJECT_ROOT/public">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
