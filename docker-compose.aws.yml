services:
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vwr_php
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    networks:
      - vwr_network

  nginx:
    image: nginx:stable-alpine
    container_name: vwr_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vwr_network
    depends_on:
      - php-fpm

volumes:
  vendor_data:

networks:
  vwr_network:
    driver: bridge